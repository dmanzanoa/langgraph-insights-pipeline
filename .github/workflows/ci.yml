name: CI

# This workflow runs on every push or pull request to the `main` branch.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against several Python versions for compatibility.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      # Check out the repository so actions have access to the code.
      - uses: actions/checkout@v4
      # Set up the requested Python version.
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install dependencies and auxiliary tools.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If a requirements file exists, install from it. Fallback to minimal packages.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff
      # Lint the codebase using Ruff. Fails the build on style violations.
      - name: Lint code with Ruff
        run: |
          ruff .
      # Run the unit tests using pytest. Add your tests in the `tests/` folder.
      - name: Run tests with pytest
        run: |
          pytest --maxfail=1 --disable-warnings
